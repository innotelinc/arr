###############################################
# Common Keys for all apps
###############################################

x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment:
    PUID: 1000
    PGID: 1000
    TZ: America/New_York
  dns:
    - 1.1.1.1
    - 1.0.0.1

services:
  ###############################################
  # RADARR - Movies
  ###############################################
  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - 7878:7878
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/radarr:/config
      - /data:/data

  ###############################################
  # SONARR - TV Shows
  ###############################################
  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8989:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/sonarr:/config
      - /data:/data

  ###############################################
  # LIDARR - Music
  ###############################################
  lidarr:
    <<: *common-keys
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    ports:
      - 8686:8686
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/lidarr:/config
      - /data:/data

  ###############################################
  # WHISPARR - XXX
  ###############################################
  whisparr:
    <<: *common-keys
    container_name: whisparr
    image: ghcr.io/hotio/whisparr:latest
    ports:
      - 6969:6969
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/whisparr:/config
      - /data:/data

  ###############################################
  # BAZARR - Subtitles
  ###############################################
  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - 6767:6767
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/bazarr:/config
      - /data/media:/data/media

  ###############################################
  # PROWLARR - Indexer Manager
  ###############################################
  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - 9696:9696
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/prowlarr:/config

  ###############################################
  # HOMARR - Dashboard
  ###############################################
  homarr:
    <<: *common-keys
    container_name: homarr
    image: ghcr.io/ajnart/homarr:latest
    ports:
      - 7575:7575
    volumes:
      - /docker/appdata/homarr/configs:/app/data/configs
      - /docker/appdata/homarr/icons:/app/public/icons
      - /docker/appdata/homarr/data:/data

  ###############################################
  # QBITTORRENT - Downloader
  ###############################################
  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/qbittorrent/docker-qbittorrent-nox:latest
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      QBT_LEGAL_NOTICE: confirm
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/qbittorrent:/config
      - /data:/data

  ###############################################
  # SABNZBD - Usenet Downloader
  ###############################################
  sabnzbd:
    <<: *common-keys
    container_name: sabnzbd
    image: ghcr.io/hotio/sabnzbd:latest
    ports:
      - 8081:8080
      - 9090:9090
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/sabnzbd:/config
      - /data:/data

  ###############################################
  # JELLYFIN - Media Server
  ###############################################
  jellyfin:
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    ports:
      - 8096:8096
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/appdata/jellyfin:/config
      - /data/media:/data/media:ro

  ###############################################
  # FLARESOLVERR - Cloudflare Bypass
  ###############################################
  flaresolverr:
    <<: *common-keys
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - 8191:8191
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      LOG_LEVEL: info

###############################################
# ARR Stack Dedicated Network
###############################################

networks:
  default:
    name: arr_network
